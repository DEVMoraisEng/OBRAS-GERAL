name: Atualizar Dados e Publicar Site de Obra

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'   # fallback — use cron-job.org como fonte primária

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar data.json
        env:
          NOTION_TOKEN_DOCS: ${{ secrets.NOTION_TOKEN_DOCS }}
          NOTION_DB_DOCS:    ${{ secrets.NOTION_DB_DOCS }}
        run: python fetch_notion.py

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "data.json sem alterações — sem commit necessário"
          else
            git commit -m "chore: atualizar data.json [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "data.json atualizado"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
